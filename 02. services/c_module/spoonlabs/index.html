<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link rel="stylesheet" as="style"
  href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard-dynamic-subset.css"
  integrity="sha384-y9k2lBaj/ETgBd4674Kql3098euvZU5fWlBcBBrlROBI6c2KDmjWhd508Rfsx9R/"
  crossorigin="anonymous"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&display=swap" rel="stylesheet"/>
<title>흥미도 타임라인 | Vigloo × Proby</title>
<script>
tailwind.config = {
  theme: { extend: { fontFamily: { display: ['Pretendard','-apple-system','BlinkMacSystemFont','system-ui','sans-serif'] } } }
}
</script>
<style>
:root {
  --bg:          #080A09;
  --surface:     #0D110F;
  --card:        #141A17;
  --border:      #1E2820;
  --accent-dim:  #002E28;
  --accent:      #004038;
  --accent-hi:   #00EDD4;
  --accent-text: #00EDD4;
  --accent-lt:   #5CFFF0;
}

* { box-sizing: border-box; }
body { background: var(--bg); margin: 0; }
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none; z-index: 1; opacity: 0.5;
}

/* ── Page ── */
.page { max-width: 1600px; margin: 0 auto; padding: 0 0 6rem; position: relative; z-index: 2; }

/* ── Pagination ── */
/* ── Hero title section ── */
.ct-hero {
  padding: 2.5rem 2rem 2rem; position: relative; overflow: hidden;
}
.section-label {
  font-size: .6rem; font-weight: 900; letter-spacing: .16em; text-transform: uppercase;
  color: var(--accent-text); opacity: .6; margin-bottom: .875rem;
  font-family: 'Silkscreen', monospace;
}
.grad-text {
  background: linear-gradient(90deg, #00EDD4 0%, #5CFFF0 55%, rgba(92,255,240,.45) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.blob {
  position: absolute; border-radius: 50%; filter: blur(80px); pointer-events: none;
}

/* ── Two-column layout ── */
.top-layout {
  /* removed — user panel now placed directly as sticky element */
}

/* ── Sticky user band ── */
.user-panel {
  position: sticky;
  top: 0;
  z-index: 50;
  background: rgba(10,10,11,.93);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid rgba(255,255,255,.06);
  border-radius: 0;
  padding: .55rem 1.5rem .5rem;
  display: flex; flex-direction: column; gap: .38rem;
  margin-bottom: 0;
}
.upanel-row1 { display: flex; align-items: center; gap: .6rem; height: 38px; overflow: hidden; }
.upanel-chevron {
  flex-shrink: 0; width: 30px; height: 30px; border-radius: .38rem;
  background: rgba(0,237,212,.08); border: 1px solid rgba(0,237,212,.28);
  color: rgba(0,237,212,.65); cursor: pointer; transition: all .18s;
  display: flex; align-items: center; justify-content: center;
  font-family: inherit;
}
.upanel-chevron:hover { background: rgba(0,237,212,.2); color: #5CFFF0; border-color: rgba(0,237,212,.6); box-shadow: 0 0 10px rgba(0,237,212,.2); }
.upanel-chevron:disabled { opacity: .15; cursor: default; pointer-events: none; }
.upanel-chevron .material-symbols-outlined { font-size: 1.1rem !important; }

/* nav cluster */
@keyframes upanel-nav-glow {
  0%, 100% { box-shadow: 0 0 0 1px rgba(0,237,212,.1), 0 0 8px rgba(0,237,212,.06); }
  50%       { box-shadow: 0 0 0 1px rgba(0,237,212,.22), 0 0 16px rgba(0,237,212,.14); }
}
.upanel-nav {
  display: flex; align-items: center; gap: .3rem; flex-shrink: 0;
  background: rgba(0,237,212,.05);
  border: 1px solid rgba(0,237,212,.18);
  border-radius: .52rem; padding: .2rem .28rem;
  animation: upanel-nav-glow 3s ease-in-out infinite;
}
.upanel-nav-counter {
  font-size: .52rem; font-weight: 700; color: rgba(0,237,212,.5);
  letter-spacing: .06em; min-width: 26px; text-align: center;
  font-family: 'Silkscreen', monospace; line-height: 1;
}
.upanel-identity { display: flex; align-items: center; gap: .42rem; flex-shrink: 0; }
.upanel-meta { font-size: .58rem; color: rgba(255,255,255,.28); white-space: nowrap; }
.upanel-quote {
  flex: 1; min-width: 0;
  font-size: .62rem; color: rgba(255,255,255,.22); font-style: italic;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.upanel-row2 { display: flex; align-items: stretch; gap: 0; height: 58px; overflow: hidden; }
.upanel-cell {
  flex: 1; min-width: 0; padding: .22rem .55rem;
  border-right: 1px solid rgba(255,255,255,.055);
  display: flex; flex-direction: column; gap: .1rem;
}
.upanel-cell:first-child { padding-left: .4rem; }
.upanel-cell:last-of-type { border-right: none; }
.upanel-cell-lbl { font-size: .46rem; font-weight: 900; letter-spacing: .09em; text-transform: uppercase; color: rgba(255,255,255,.26); white-space: nowrap; }
.upanel-cell-val { font-size: .56rem; color: rgba(255,255,255,.58); line-height: 1.35;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  min-height: 1.52rem; }
.upanel-vdivider { width: 1px; background: rgba(255,255,255,.055); flex-shrink: 0; margin: 0 .1rem; align-self: stretch; }
.upanel-tags-col { display: flex; flex-direction: column; gap: .15rem; padding: .22rem .75rem; flex: 2; min-width: 140px; overflow: hidden; }
.upanel-tags-lbl { font-size: .46rem; font-weight: 900; letter-spacing: .1em; text-transform: uppercase; color: rgba(255,255,255,.22); white-space: nowrap; }
.upanel-tags-row { display: flex; flex-wrap: wrap; gap: .22rem .18rem; }

/* ── Left: content thumbnails ── */
.content-panel {
  background: rgba(255,255,255,.02);
  border: 1px solid rgba(255,255,255,.06);
  border-radius: 1rem;
  padding: 1rem 1rem .75rem;
}
.panel-label {
  font-size: .6rem; font-weight: 900; letter-spacing: .14em; text-transform: uppercase;
  color: rgba(255,255,255,.22); margin-bottom: .875rem;
}
.thumb-scroll {
  display: flex; gap: .625rem; overflow-x: auto; padding-bottom: .375rem;
}
.thumb-scroll::-webkit-scrollbar { height: 3px; }
.thumb-scroll::-webkit-scrollbar-track { background: transparent; }
.thumb-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,.08); border-radius: 2px; }

.ct-legend-card {
  flex-shrink: 0; width: 100px;
  border-radius: .75rem; border: 1.5px solid rgba(255,255,255,.07);
  background: rgba(255,255,255,.03);
  cursor: pointer; transition: all .2s;
  overflow: hidden; font-family: inherit;
}
.ct-legend-card:hover  { background: rgba(255,255,255,.06); }
.ct-legend-card.active { background: rgba(255,255,255,.055); border-color: rgba(0,237,212,.35); }
.ct-legend-card.inactive { opacity: .32; }
.ct-legend-card-bar { height: 3px; width: 100%; }
.ct-legend-card.inactive .ct-legend-card-bar { opacity: .35; }
.ct-legend-card-thumb {
  width: 100%; aspect-ratio: 3/4;
  background: rgba(17,17,22,.9);
  display: flex; align-items: center; justify-content: center;
  position: relative; overflow: hidden;
}
.ct-legend-card-thumb img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
.ct-legend-thumb-icon { font-size: 1.4rem !important; color: rgba(0,237,212,.3); }
.ct-legend-card-body { padding: .45rem .55rem .6rem; }
.ct-legend-card-title {
  font-size: .65rem; font-weight: 700; color: rgba(255,255,255,.8); line-height: 1.45;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.ct-legend-card-ep { font-size: .58rem; color: rgba(255,255,255,.26); margin-top: .18rem; }
.ct-legend-type-badge {
  display: inline-block; font-size: .48rem; font-weight: 600; letter-spacing: .04em;
  text-transform: uppercase; padding: .08rem .32rem; border-radius: .22rem; margin-bottom: .28rem;
}
.ct-legend-type-badge.human { background: rgba(196,148,84,.18); color: rgba(196,148,84,.85); }
.ct-legend-type-badge.ai    { background: rgba(139,92,246,.22); color: rgba(167,139,250,.95); border: 1px solid rgba(139,92,246,.35); }

/* AI content marker overlay */
.ct-ai-chip {
  position: absolute; top: 5px; right: 5px;
  font-size: .42rem; font-weight: 900; letter-spacing: .1em; text-transform: uppercase;
  background: rgba(139,92,246,.88); color: #fff;
  border-radius: .22rem; padding: .1rem .3rem;
  border: 1px solid rgba(167,139,250,.4);
  box-shadow: 0 0 8px rgba(139,92,246,.5);
}
.ct-legend-card.ai-content .ct-legend-card-thumb {
  background: rgba(139,92,246,.07);
}
.ct-legend-card.ai-content {
  box-shadow: inset 0 0 0 1.5px rgba(139,92,246,.2);
}


/* ── User avatar / name (shared) ── */
.user-avatar {
  width: 44px; height: 44px; border-radius: 50%;
  background: linear-gradient(135deg, rgba(0,60,50,.9), rgba(0,100,80,.7));
  border: 1.5px solid rgba(0,237,212,.4);
  display: flex; align-items: center; justify-content: center;
  font-size: 1rem; font-weight: 900; color: rgba(0,237,212,.85);
  letter-spacing: -.02em; flex-shrink: 0;
}
.user-name { font-size: .95rem; font-weight: 800; color: rgba(255,255,255,.88); }
.user-meta { font-size: .65rem; color: rgba(255,255,255,.32); margin-top: .1rem; }
.user-divider { height: 1px; background: rgba(255,255,255,.06); flex-shrink: 0; }

/* Persona tag chips */
.persona-section-lbl {
  font-size: .58rem; font-weight: 900; letter-spacing: .14em; text-transform: uppercase;
  color: rgba(255,255,255,.22); margin-bottom: .5rem;
}
.persona-tag-row { display: flex; flex-wrap: wrap; gap: .35rem; }
.persona-tag {
  font-size: .62rem; font-weight: 600; padding: .22rem .6rem; border-radius: .35rem;
  background: rgba(0,237,212,.15); border: 1px solid rgba(0,237,212,.22);
  color: rgba(163,194,239,.75);
}
.persona-tag.red    { background: rgba(248,65,65,.12);  border-color: rgba(248,65,65,.2);  color: rgba(248,113,113,.75); }
.persona-tag.green  { background: rgba(52,211,153,.1);  border-color: rgba(52,211,153,.2); color: rgba(52,211,153,.75); }
.persona-tag.amber  { background: rgba(251,191,36,.1);  border-color: rgba(251,191,36,.2); color: rgba(251,191,36,.75); }
.persona-tag.purple { background: rgba(167,139,250,.1); border-color: rgba(167,139,250,.2); color: rgba(167,139,250,.75); }

/* Persona quote */
.persona-quote {
  font-size: .7rem; line-height: 1.6; color: rgba(255,255,255,.5); font-style: italic;
  border-left: 2px solid rgba(0,237,212,.4); padding-left: .65rem;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
/* Persona info grid */
.persona-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: .38rem;
}
/* Persona body: insights left | tags right */
.persona-body-grid {
  display: grid; grid-template-columns: 5fr 3fr; gap: 1.25rem; align-items: start;
}
.persona-insights-col { display: flex; flex-direction: column; gap: .38rem; }
.persona-tags-col     { display: flex; flex-direction: column; gap: .75rem; }
.persona-cell {
  background: rgba(255,255,255,.025); border: 1px solid rgba(255,255,255,.06);
  border-radius: .48rem; padding: .42rem .52rem;
}
.persona-cell-wide { grid-column: 1 / -1; }
.persona-cell-lbl {
  font-size: .5rem; font-weight: 700; letter-spacing: .12em; text-transform: uppercase;
  color: rgba(255,255,255,.22); margin-bottom: .18rem;
}
.persona-cell-val {
  font-size: .64rem; color: rgba(255,255,255,.58); line-height: 1.48;
}

/* ── Chart panel ── */
.ct-chart-panel {
  background: rgba(10,10,11,.45); border: 1px solid rgba(37,37,45,.7);
  border-radius: 1rem; overflow: hidden; margin: .75rem 1.5rem 0;
}
.ct-chart-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: .8rem 1.25rem .7rem;
  border-bottom: 1px solid rgba(37,37,45,.4);
}
.ct-chart-bar-label { font-size: .6rem; font-weight: 900; letter-spacing: .1em; text-transform: uppercase; color: rgba(0,237,212,.35); font-family: 'Silkscreen', monospace; }
.ct-chart-bar-hint  { font-size: .58rem; color: rgba(255,255,255,.13); }
.ct-chart-body { display: flex; align-items: stretch; height: 315px; overflow: hidden; }
.ct-yaxis-panel { flex-shrink: 0; width: 52px; border-right: 1px solid rgba(37,37,45,.45); }

/* ── Series sidebar (between y-axis and chart scroll) ── */
.ct-series-col {
  flex-shrink: 0; width: 80px;
  border-right: 1px solid rgba(37,37,45,.4);
  display: flex; flex-direction: column;
  background: rgba(10,10,11,.15);
}
.ct-series-card {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: .3rem;
  padding: .45rem .3rem; cursor: pointer;
  border-bottom: 1px solid rgba(37,37,45,.25);
  transition: background .15s, opacity .15s;
  text-align: center; position: relative;
}
.ct-series-card:last-child { border-bottom: none; }
.ct-series-card:hover { background: rgba(255,255,255,.03); }
.ct-series-card.soloed { background: rgba(0,237,212,.08); }
.ct-series-card.dimmed { opacity: .22; }
.ct-series-card-stripe { width: 100%; height: 2.5px; position: absolute; top: 0; left: 0; }
.ct-series-card-icon {
  width: 34px; height: 34px; border-radius: .45rem;
  background: rgba(255,255,255,.04);
  border: 1px solid rgba(255,255,255,.07);
  display: flex; align-items: center; justify-content: center;
  position: relative; overflow: visible;
}
.ct-series-card-title {
  font-size: .46rem; font-weight: 700; color: rgba(255,255,255,.45);
  line-height: 1.35; max-width: 68px;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}

/* ── Quote rail thumb column ── */
.ct-yaxis-spacer { flex-shrink: 0; width: 52px; border-right: 1px solid rgba(37,37,45,.45); background: rgba(10,10,11,.15); }
.ct-qthumb-col {
  flex-shrink: 0; width: 80px;
  border-right: 1px solid rgba(37,37,45,.4);
  display: flex; flex-direction: column;
  background: rgba(10,10,11,.15);
}
.ct-qthumb-card {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: .3rem;
  padding: .5rem .3rem; cursor: pointer;
  border-bottom: 1px solid rgba(37,37,45,.22);
  transition: background .15s, opacity .15s;
  text-align: center; position: relative; min-height: 60px;
}
.ct-qthumb-card:last-child { border-bottom: none; }
.ct-qthumb-card:hover { background: rgba(255,255,255,.03); }
.ct-qthumb-card.soloed { background: rgba(0,237,212,.08); }
.ct-qthumb-card.dimmed { opacity: .22; }
.ct-qthumb-img-wrap {
  width: calc(100% - .6rem); flex-shrink: 0;
  height: 60px; border-radius: .35rem; overflow: hidden;
  position: relative; display: flex; align-items: center; justify-content: center;
  background: rgba(255,255,255,.04);
}
.ct-yaxis-svg   { display: block; }
.ct-chart-scroll { flex: 1; overflow-x: auto; overflow-y: hidden; min-width: 0; height: 315px; scrollbar-gutter: stable; }
.ct-chart-scroll::-webkit-scrollbar       { height: 5px; }
.ct-chart-scroll::-webkit-scrollbar-track  { background: rgba(255,255,255,.02); }
.ct-chart-scroll::-webkit-scrollbar-thumb  { background: rgba(0,237,212,.35); border-radius: 3px; }
.ct-main-svg { display: block; }

.ct-state-empty {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  height: 310px; gap: .5rem; color: rgba(255,255,255,.13); font-size: .75rem; text-align: center;
}
.ct-state-empty .material-symbols-outlined { font-size: 2rem; opacity: .3; display: block; }

/* ── Tooltip ── */
#ct-tooltip {
  position: fixed; z-index: 600; pointer-events: none;
  background: rgba(8,10,16,.98); border: 1px solid rgba(0,237,212,.35);
  border-radius: .75rem; padding: .875rem 1rem; width: 220px;
  backdrop-filter: blur(16px); box-shadow: 0 12px 40px rgba(0,0,0,.7);
  opacity: 0; transition: opacity .12s; transform: translate(-50%,-115%);
}
#ct-tooltip.show { opacity: 1; }
.ct-tip-title { font-size: .58rem; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: rgba(255,255,255,.3); margin-bottom: .35rem; }
.ct-tip-score { font-size: 1.75rem; font-weight: 900; line-height: 1; margin-bottom: .25rem; letter-spacing: -.02em; }
.ct-tip-score span { font-size: .82rem; font-weight: 600; color: rgba(255,255,255,.4); margin-left: 2px; }
.ct-tip-time  { font-size: .6rem; color: rgba(255,255,255,.3); margin-bottom: .625rem; }
.ct-tip-quote { font-size: .77rem; color: rgba(255,255,255,.6); line-height: 1.65; font-style: italic; border-left: 2px solid rgba(0,237,212,.5); padding-left: .625rem; }
.ct-tip-dropout-label { display: inline-block; font-size: .58rem; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; background: rgba(248,65,65,.18); color: #f87171; border-radius: .35rem; padding: .2rem .5rem; margin-bottom: .5rem; }
.ct-tip-dropout .ct-tip-quote { border-left-color: rgba(248,113,113,.5); }

/* ── Quote Rail ── */
.ct-quote-section {
  display: flex; align-items: stretch;
  border-top: 1px solid rgba(37,37,45,.45);
}
.ct-qsection-scroll {
  flex: 1; overflow-x: auto; overflow-y: hidden; min-width: 0; scrollbar-gutter: stable;
}
.ct-qsection-scroll::-webkit-scrollbar       { height: 5px; }
.ct-qsection-scroll::-webkit-scrollbar-track  { background: rgba(255,255,255,.02); }
.ct-qsection-scroll::-webkit-scrollbar-thumb  { background: rgba(0,237,212,.35); border-radius: 3px; }
.ct-qseries { border-bottom: 1px solid rgba(37,37,45,.3); }
.ct-qseries:last-child { border-bottom: none; }
.ct-qseries-hdr {
  display: flex; align-items: center; gap: .45rem;
  padding: .4rem .7rem .35rem;
  background: rgba(255,255,255,.015);
  border-bottom: 1px solid rgba(37,37,45,.18);
}
.ct-qseries-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.ct-qseries-name { font-size: .6rem; font-weight: 700; color: rgba(255,255,255,.42); flex: 1; }
.ct-qseries-type-badge {
  font-size: .48rem; font-weight: 700; text-transform: uppercase; letter-spacing: .06em;
  padding: .07rem .28rem; border-radius: .2rem;
}
.ct-qseries-type-badge.human { background: rgba(196,148,84,.18); color: rgba(196,148,84,.8); }
.ct-qseries-type-badge.ai    { background: rgba(92,126,162,.18); color: rgba(92,126,162,.8); }
.ct-qcards-row { display: flex; }
.ct-qcard {
  flex-shrink: 0;
  border-right: 1px solid rgba(37,37,45,.22);
  padding: .5rem .6rem .7rem;
  display: flex; flex-direction: column; gap: .2rem;
  min-height: 86px;
}
.ct-qcard:last-child { border-right: none; }
.ct-qcard-ep {
  font-size: .54rem; font-weight: 700; letter-spacing: .06em;
  color: rgba(163,194,239,.4);
}
.ct-qcard-score {
  font-size: .76rem; font-weight: 900; letter-spacing: -.01em; line-height: 1.1;
}
.ct-qcard-quote {
  font-size: .62rem; color: rgba(255,255,255,.46); line-height: 1.56;
  display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
  overflow: hidden; flex: 1; font-style: italic;
}
.ct-qcard-no-quote { font-size: .6rem; color: rgba(255,255,255,.1); }

/* ── Content Evaluation Section ── */
.eval-section { margin: 1.5rem 1.5rem 0; padding-bottom: 2rem; }
.eval-section-hdr { display: flex; align-items: baseline; gap: 1rem; margin-bottom: 1.2rem; flex-wrap: wrap; }
.eval-section-hdr-title { font-size: 1.35rem; font-weight: 900; color: rgba(255,255,255,.88); letter-spacing: -.02em; }
.eval-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(295px, 1fr)); gap: .875rem; }
.eval-card { background: rgba(10,10,11,.5); border: 1px solid rgba(37,37,45,.65); border-radius: 1rem; overflow: hidden; transition: border-color .2s; }
.eval-card:hover { border-color: rgba(37,37,45,.95); }
.eval-card-top { display: flex; gap: .8rem; padding: .85rem .9rem; border-top: 3px solid; }
.eval-poster { flex-shrink: 0; width: 56px; height: 74px; border-radius: .45rem; overflow: hidden; position: relative; background: rgba(255,255,255,.04); }
.eval-poster img { width: 100%; height: 100%; object-fit: cover; display: block; }
.eval-meta { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: .3rem; }

/* ─────────────────── CHART CONSTANTS ─────────────────── */
let EP_W = 160; // computed dynamically: scrollWidth / 7
const VH = 310, PT = 28, PB = 64, PR = 30;

/* ── Display scale: raw 1-10 → display -3 to +3 ── */
const DMIN = -3, DMAX = 3;
function toDisplay(raw){ return (raw - 1) / 9 * 6 - 3; }
function fmtScore(d){ return d > 0 ? '+' + d : String(d); }

/* ─────────────────── STATE ─────────────────── */
let currentUserIdx = 0;
let visibleSet = new Set();

/* ─────────────────── HELPERS ─────────────────── */
function integerInterestScore(s){
  const n = Number(s);
  if(!Number.isFinite(n)) return 5;
  return Math.round(Math.min(10, Math.max(1, n)));
}
function scoreColor(d){
  /* d = display score (-3 to +3) */
  if(d >= 1)  return '#34d399';
  if(d >= -1) return '#fbbf24';
  return '#f87171';
}
function buildPoints(series){
  const raw = series.points
    .map(p => ({ ...p, score: integerInterestScore(p.score) }))
    .sort((a, b) => a.time - b.time);
  const pts = raw.filter((p, i) =>
    i === 0 || i === raw.length - 1 || p.score !== raw[i-1].score
  );
  return pts;
}
function getXNorm(time, boundaries){
  if(!boundaries || !boundaries.length) return 0;
  let epIdx = 0;
  for(let i = 0; i < boundaries.length; i++){
    if(time >= boundaries[i].time) epIdx = i;
  }
  const epStart = boundaries[epIdx].time;
  let epDur;
  if(epIdx < boundaries.length - 1){
    epDur = boundaries[epIdx + 1].time - epStart;
  } else {
    epDur = boundaries.length >= 2
      ? (boundaries[boundaries.length-1].time - boundaries[0].time) / (boundaries.length - 1)
      : 300;
  }
  const pct = epDur > 0 ? Math.max(0, Math.min(108, (time - epStart) / epDur * 100)) : 0;
  return epIdx * 100 + pct;
}
function xNormToSvg(xNorm){ return xNorm * EP_W / 100; }

/* ys: maps display score (-3 to +3) → SVG y position */
function ys(d){ return PT + (VH - PT - PB) * (DMAX - d) / (DMAX - DMIN); }
/* pyOf: get y for a data point (handles tail points) */
function pyOf(p){ return p.isTail ? ys(DMIN) : ys(toDisplay(p.score)); }
function hexToRgba(hex, a){
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

/* ─────────────────── CHART ─────────────────── */
function redrawChart(){
  /* ── compute EP_W so 7 episodes fit the visible scroll area ── */
  const scrollEl = document.getElementById('ct-chart-scroll');
  EP_W = scrollEl.clientWidth > 0 ? Math.max(80, Math.floor(scrollEl.clientWidth / 7)) : 160;

  const emptySt = document.getElementById('ct-empty-state');
  const mainSvg = document.getElementById('ct-main-svg');
  const user = USERS[currentUserIdx];
  const activeSeries = user.seriesIndices
    .map((si, localIdx) => ({ series: ALL_SERIES[si], localIdx }))
    .filter(({ localIdx }) => visibleSet.has(localIdx));

  if(!activeSeries.length){
    emptySt.style.display = ''; mainSvg.style.display = 'none'; return;
  }
  emptySt.style.display = 'none'; mainSvg.style.display = 'block';

  const maxEps = activeSeries.reduce((m, { series }) => Math.max(m, series.boundaries.length), 0);
  const totalW = maxEps * EP_W + PR;
  mainSvg.setAttribute('width', totalW);
  mainSvg.setAttribute('height', VH);

  let defs = '<defs>';
  activeSeries.forEach(({ series, localIdx }) => {
    const col = getSeriesColor(series);
    defs += `
      <linearGradient id="gr-${localIdx}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%"   stop-color="${col.fillTop}"/>
        <stop offset="100%" stop-color="${col.fillBot}"/>
      </linearGradient>
      <linearGradient id="tg-${localIdx}" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%"   stop-color="${col.dot}" stop-opacity=".40"/>
        <stop offset="100%" stop-color="${col.dot}" stop-opacity=".06"/>
      </linearGradient>`;
  });
  defs += '</defs>';

  /* ── grid lines at display ticks ── */
  let grid = '';
  for(const d of [DMIN, -1, 0, 1, DMAX]){
    const y = ys(d);
    const isZero = d === 0;
    grid += `<line x1="0" y1="${y}" x2="${totalW}" y2="${y}"
                   stroke="${isZero ? 'rgba(255,255,255,.10)' : 'rgba(255,255,255,.04)'}"
                   stroke-width="${isZero ? 1.5 : 1}" stroke-dasharray="${isZero ? '4 4' : 'none'}"/>`;
  }

  /* ── episode boundary lines + X ticks ── */
  let axes = '';
  for(let ep = 0; ep <= maxEps; ep++){
    const x = ep * EP_W;
    axes += `<line x1="${x}" y1="${PT}" x2="${x}" y2="${VH-PB}"
                   stroke="rgba(163,194,239,.2)" stroke-width="${ep === maxEps ? 1 : 1.5}"/>`;
    if(ep < maxEps){
      axes += `<text x="${x+6}" y="${PT+12}" fill="rgba(163,194,239,.55)" font-size="9"
                     font-weight="700" font-family="Pretendard,sans-serif">${ep+1}화</text>`;
      for(let pct = 0; pct <= 100; pct += 10){
        const tx = x + (pct/100) * EP_W;
        const major = (pct===0||pct===50||pct===100);
        axes += `<line x1="${tx}" y1="${VH-PB}" x2="${tx}" y2="${VH-PB+(major?6:4)}"
                       stroke="${major?'rgba(255,255,255,.16)':'rgba(255,255,255,.07)'}" stroke-width="1"/>`;
        if(pct===50) axes += `<text x="${tx}" y="${VH-PB+15}" text-anchor="middle"
          fill="rgba(255,255,255,.16)" font-size="7.5" font-family="Pretendard,sans-serif">50%</text>`;
      }
    }
  }
  axes += `<text x="${totalW/2}" y="${VH-4}" text-anchor="middle" fill="rgba(255,255,255,.13)"
                 font-size="9" font-family="Pretendard,sans-serif" letter-spacing="1">에피소드별 시청 진행률</text>`;

  const seriesPointsCache = new Map();
  let linesLayer = '';
  const allDotRender = [];

  activeSeries.forEach(({ series, localIdx }) => {
    const pts = buildPoints(series);
    seriesPointsCache.set(localIdx, pts);

    const col = getSeriesColor(series);
    const xs  = t => xNormToSvg(getXNorm(t, series.boundaries));

    function bezier(arr){
      if(!arr.length) return '';
      let d = `M ${xs(arr[0].time)} ${pyOf(arr[0])}`;
      for(let i = 1; i < arr.length; i++){
        const mx = (xs(arr[i-1].time) + xs(arr[i].time)) / 2;
        d += ` C ${mx} ${pyOf(arr[i-1])}, ${mx} ${pyOf(arr[i])}, ${xs(arr[i].time)} ${pyOf(arr[i])}`;
      }
      return d;
    }

    const mainD = bezier(pts);
    let fillD = bezier(pts);
    if(pts.length){
      fillD += ` L ${xs(pts[pts.length-1].time)} ${VH-PB} L ${xs(pts[0].time)} ${VH-PB} Z`;
    }

    linesLayer += `<path d="${fillD}" fill="url(#gr-${localIdx})"/>`;
    linesLayer += `<path d="${mainD}" fill="none" stroke="${col.line}" stroke-width="2.5"
                          stroke-linecap="round" stroke-linejoin="round"/>`;

    pts.forEach((p, i) => {
      allDotRender.push({ cx: xs(p.time), cy: pyOf(p), localIdx, pi: i, p, col, delay: ((i*0.38)%2).toFixed(2) });
    });
  });

  const JITTER_R = 7;
  for(let i = 1; i < allDotRender.length; i++){
    for(let j = 0; j < i; j++){
      const a = allDotRender[i], b = allDotRender[j];
      if(Math.abs(a.cx-b.cx) < JITTER_R && Math.abs(a.cy-b.cy) < JITTER_R){
        a.cy -= JITTER_R - Math.abs(a.cy-b.cy);
      }
    }
  }

  let dotsLayer = '';
  allDotRender.forEach(({ cx, cy, localIdx, pi, p, col, delay }) => {
    const dc = col.dot;
    dotsLayer += `
      <g data-li="${localIdx}" data-pi="${pi}" style="cursor:pointer;">
        <circle class="ct-dot-pulse" cx="${cx}" cy="${cy}" r="6" fill="none" stroke="${dc}" stroke-width="1.2" style="animation-delay:${delay}s;"/>
        <circle cx="${cx}" cy="${cy}" r="13" fill="transparent"/>
        <circle cx="${cx}" cy="${cy}" r="7" fill="none" stroke="${dc}" stroke-width="1" stroke-opacity=".18"/>
        <circle cx="${cx}" cy="${cy}" r="4" fill="${dc}" opacity=".88"/>
      </g>`;
  });

  mainSvg.innerHTML = defs + grid + axes + linesLayer + dotsLayer;

  mainSvg.querySelectorAll('g[data-li]').forEach(g => {
    const li = parseInt(g.dataset.li, 10);
    const pi = parseInt(g.dataset.pi, 10);
    const pts = seriesPointsCache.get(li);
    if(!pts) return;
    const p = pts[pi];
    if(!p) return;
    const user = USERS[currentUserIdx];
    const si = user.seriesIndices[li];
    const seriesTitle = `${user.name} · ${ALL_SERIES[si].title}`;

    g.addEventListener('mouseenter', e => {
      showTooltip(e, p, seriesTitle);
      const cs = g.querySelectorAll('circle');
      cs[3]?.setAttribute('r','5.5'); cs[2]?.setAttribute('r','9');
    });
    g.addEventListener('mousemove',  e => moveTooltip(e));
    g.addEventListener('mouseleave', () => {
      hideTooltip();
      const cs = g.querySelectorAll('circle');
      cs[3]?.setAttribute('r','4'); cs[2]?.setAttribute('r','7');
    });
  });
  renderQuoteRail();
}

/* ─────────────────── QUOTE RAIL ─────────────────── */
function renderQuoteRail(){
  const rail    = document.getElementById('ct-quote-rail');
  const section = document.getElementById('ct-quote-section');
  if(!rail || !section) return;

  const user = USERS[currentUserIdx];
  const activeSeries = user.seriesIndices
    .map((si, localIdx) => ({ series: ALL_SERIES[si], localIdx }))
    .filter(({ localIdx }) => visibleSet.has(localIdx));

  if(!activeSeries.length){ section.style.display = 'none'; return; }
  section.style.display = 'flex';

  const seriesHtml = activeSeries.map(({ series, localIdx }) => {
    const col = getSeriesColor(series);

    /* group: last quote + last score per episode */
    const epData = {};
    series.boundaries.forEach(b => { epData[b.label] = { quotes: [], lastScore: null }; });
    series.points.forEach(p => {
      if(!p.label || epData[p.label] === undefined) return;
      const s = integerInterestScore(p.score);
      epData[p.label].lastScore = s;
      if(p.quote) epData[p.label].quotes.push(p.quote);
    });

    const cardsHtml = series.boundaries.map(b => {
      const data  = epData[b.label] || { quotes: [], lastScore: null };
      const quote = data.quotes[data.quotes.length - 1] || '';
      const score = data.lastScore;
      const d     = score !== null ? Math.round(toDisplay(score)) : null;
      const color = d !== null ? scoreColor(d) : 'rgba(255,255,255,.18)';
      const scoreLabel = d !== null ? fmtScore(d) + '점' : '—';
      return `<div class="ct-qcard" style="width:${EP_W}px;">
        <div class="ct-qcard-ep">${b.label}</div>
        <div class="ct-qcard-score" style="color:${color};">${scoreLabel}</div>
        ${quote
          ? `<div class="ct-qcard-quote">"${quote}"</div>`
          : `<div class="ct-qcard-no-quote">—</div>`
        }
      </div>`;
    }).join('');

    return `<div class="ct-qseries">
      <div class="ct-qseries-hdr">
        ${(() => { const t = getSeriesThumb(series); return t
          ? `<img src="${t}" alt="${series.title}" style="width:20px;height:28px;object-fit:cover;border-radius:.22rem;flex-shrink:0;"/>`
          : `<div class="ct-qseries-dot" style="background:${col.dot};"></div>`; })()}
        <div class="ct-qseries-name">${series.title}</div>
        <span class="ct-qseries-type-badge ${series.type.toLowerCase()}">${series.type}</span>
      </div>
      <div class="ct-qcards-row">${cardsHtml}</div>
    </div>`;
  }).join('');

  rail.innerHTML = seriesHtml;
  renderQThumbCol();
  syncQThumbHeights();
}

/* ─────────────────── TOOLTIP ─────────────────── */
const TT = document.getElementById('ct-tooltip');
function showTooltip(e, p, title){
  const raw  = p.score;
  const d    = Math.round(toDisplay(raw));
  const col  = p.isDropout ? '#f87171' : scoreColor(d);
  document.getElementById('tip-title').textContent = title || '';
  if(p.isDropout){
    TT.classList.add('ct-tip-dropout');
    document.getElementById('tip-score').innerHTML = `<div class="ct-tip-dropout-label">이탈 포인트</div>`;
    document.getElementById('tip-time').textContent = p.label ? `${p.label} — 시청 중단` : '시청 중단';
  } else {
    TT.classList.remove('ct-tip-dropout');
    document.getElementById('tip-score').innerHTML = `<span style="color:${col};">${fmtScore(d)}</span><span>점</span>`;
    document.getElementById('tip-time').textContent = p.label || '';
  }
  const qEl = document.getElementById('tip-quote');
  qEl.textContent = p.quote;
  qEl.style.display = p.quote ? '' : 'none';
  TT.style.left = e.clientX + 'px';
  TT.style.top  = e.clientY + 'px';
  TT.classList.add('show');
}
function moveTooltip(e){ TT.style.left = e.clientX + 'px'; TT.style.top = e.clientY + 'px'; }
function hideTooltip(){ TT.classList.remove('show'); TT.classList.remove('ct-tip-dropout'); }

function evalScoreColor(score){
  if(score === null || score === undefined) return 'rgba(255,255,255,.08)';
  if(score >= 2)   return '#00EDD4';
  if(score === 1)  return '#F59E0B';
  if(score === 0)  return 'rgba(255,255,255,.18)';
  if(score === -1) return '#F97316';
  return '#EF4444';
}

/* ── Sync quote rail scroll with chart scroll ── */
(function(){
  const cs = document.getElementById('ct-chart-scroll');
  const qs = document.getElementById('ct-qsection-scroll');
  if(!cs || !qs) return;
  let lock = false;
  cs.addEventListener('scroll', () => {
    if(lock) return; lock = true;
    qs.scrollLeft = cs.scrollLeft;
    requestAnimationFrame(() => { lock = false; });
  });
  qs.addEventListener('scroll', () => {
    if(lock) return; lock = true;
    cs.scrollLeft = qs.scrollLeft;
    requestAnimationFrame(() => { lock = false; });
  });
})();
</script>
</body>
